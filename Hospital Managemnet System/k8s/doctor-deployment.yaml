apiVersion: apps/v1
kind: Deployment

metadata:
  name: doctor-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: doctor-service

  template:

    metadata:
      labels:
        app: doctor-service

    spec:

      containers:
        - name: doctor-service

          image: doctor-service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 9091

          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:oracle:thin:@host.docker.internal:1521/XEPDB1

            - name: SPRING_DATASOURCE_USERNAME
              value: hospital

            - name: SPRING_DATASOURCE_PASSWORD
              value: hospital123

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-service:8761/eureka

---

apiVersion: v1
kind: Service

metadata:
  name: doctor-service

spec:
  selector:
    app: doctor-service

  ports:
    - protocol: TCP
      port: 9091
      targetPort: 9091

  type: NodePort