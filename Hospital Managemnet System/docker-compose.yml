version: '3.8'

services:

  eureka-server:
    image: eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"

  api-gateway:
    image: api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server

  patient-service:
    image: patient-service
    container_name: patient-service
    ports:
      - "9090:9090"
    depends_on:
      - eureka-server

  doctor-service:
    image: doctor-service
    container_name: doctor-service
    ports:
      - "9091:9091"
    depends_on:
      - eureka-server

  appointment-service:
    image: appointment-service
    container_name: appointment-service
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server

  billing-service:
    image: billing-service
    container_name: billing-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server