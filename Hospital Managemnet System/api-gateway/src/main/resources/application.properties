spring.application.name=api-gateway

server.port=8080

eureka.client.service-url.defaultZone=http://eureka-service:8761/eureka

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# PATIENT SERVICE
spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=http://patient-service:9090
spring.cloud.gateway.routes[0].predicates[0]=Path=/patients/**

# DOCTOR SERVICE
spring.cloud.gateway.routes[1].id=doctor-service
spring.cloud.gateway.routes[1].uri=http://doctor-service:9091
spring.cloud.gateway.routes[1].predicates[0]=Path=/doctors/**

# APPOINTMENT SERVICE
spring.cloud.gateway.routes[2].id=appointment-service
spring.cloud.gateway.routes[2].uri=http://appointment-service:9092
spring.cloud.gateway.routes[2].predicates[0]=Path=/appointments/**

# BILLING SERVICE
spring.cloud.gateway.routes[3].id=billing-service
spring.cloud.gateway.routes[3].uri=http://billing-service:9093
spring.cloud.gateway.routes[3].predicates[0]=Path=/bills/**


# GLOBAL CORS
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE
